<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot the Fake Photo AI - Live Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 26, 46, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-glow: #00f0ff;
            --danger-glow: #ff007f;
            --success-glow: #39ff14;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 10%, rgba(26, 21, 62, 0.5) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(13, 44, 84, 0.5) 0px, transparent 50%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #00f0ff, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
        }

        /* Video Feed Area */
        .feed-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #060913;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* mirror effect */
        }

        /* Futuristic Scanner overlay */
        .scanner-reticle {
            position: absolute;
            inset: 20px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            pointer-events: none;
            border-radius: 8px;
        }

        .scanner-reticle::before,
        .scanner-reticle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--primary-glow);
            border-style: solid;
        }

        /* Corners styling */
        .scanner-reticle::before {
            top: 0; left: 0;
            border-width: 3px 0 0 3px;
        }
        .scanner-reticle::after {
            bottom: 0; right: 0;
            border-width: 0 3px 3px 0;
        }

        /* Laser line scanning */
        .laser-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, rgba(0, 240, 255, 0) 0%, var(--primary-glow) 50%, rgba(0, 240, 255, 0) 100%);
            box-shadow: 0 0 8px var(--primary-glow);
            animation: scan 3s linear infinite;
            pointer-events: none;
            display: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* Controls */
        .controls {
            margin-top: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .controls-row {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        select {
            flex: 1;
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #00f0ff 0%, #0072ff 100%);
            color: #fff;
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #374151;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-glow);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* Results Sidebar */
        .results-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1.5rem;
        }

        /* Score Circle Gauge */
        .gauge-container {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .gauge-svg {
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 14;
        }

        .gauge-fill {
            fill: none;
            stroke: var(--success-glow);
            stroke-width: 14;
            stroke-dasharray: 565; /* 2 * PI * r (r=90) */
            stroke-dashoffset: 565;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease;
            stroke-linecap: round;
        }

        .gauge-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gauge-val {
            font-size: 2.8rem;
            font-weight: 800;
        }

        .gauge-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: -2px;
        }

        /* Alert Status Display */
        .status-badge {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.5s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
        }

        .status-badge.real {
            background: rgba(57, 255, 20, 0.05);
            border-color: rgba(57, 255, 20, 0.2);
            color: var(--success-glow);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.05);
        }

        .status-badge.screen {
            background: rgba(255, 0, 127, 0.05);
            border-color: rgba(255, 0, 127, 0.2);
            color: var(--danger-glow);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.05);
        }

        .stats-list {
            width: 100%;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 16px;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: left;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
        }

        .stat-label {
            color: var(--text-muted);
        }

        .stat-value {
            font-weight: 600;
        }

        /* Canvas for hidden capturing */
        #capture-canvas {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Fake Photo Detector AI</h1>
        <p>Live Screen Recapture (Anti-Fraud) Verification</p>
    </header>

    <div class="container">
        <!-- Live Video Feed -->
        <div class="glass-panel">
            <div class="feed-container">
                <video id="webcam" autoplay playsinline></video>
                <div class="scanner-reticle"></div>
                <div class="laser-line" id="laser"></div>
            </div>

            <div class="controls">
                <div class="controls-row">
                    <select id="camera-select">
                        <option value="">Selecting camera...</option>
                    </select>
                    <button class="btn" id="scan-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        Scan Frame
                    </button>
                </div>

                <div class="toggle-container">
                    <div>
                        <div style="font-weight: 600;">Auto-Scan Mode</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted);">Continuously verify feed every 1 second</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="autoscan-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Scanning Results -->
        <div class="glass-panel results-panel">
            <div class="gauge-container">
                <svg class="gauge-svg" width="200" height="200">
                    <circle class="gauge-bg" cx="100" cy="100" r="90"></circle>
                    <circle class="gauge-fill" id="gauge-ring" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="gauge-text">
                    <div class="gauge-val" id="gauge-val">--%</div>
                    <div class="gauge-label">Fraud Score</div>
                </div>
            </div>

            <div class="status-badge" id="status-badge">
                Ready to Scan
            </div>

            <div class="stats-list">
                <div class="stat-item">
                    <span class="stat-label">Model Architecture:</span>
                    <span class="stat-value" style="color: var(--primary-glow);">MobileNetV3 + LogReg</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Frame Resolution:</span>
                    <span class="stat-value" id="res-val">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Inference Latency:</span>
                    <span class="stat-value" id="latency-val">--</span>
                </div>
            </div>
        </div>
    </div>

    <canvas id="capture-canvas" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const cameraSelect = document.getElementById('camera-select');
        const scanBtn = document.getElementById('scan-btn');
        const autoscanToggle = document.getElementById('autoscan-toggle');
        const laser = document.getElementById('laser');
        
        const gaugeRing = document.getElementById('gauge-ring');
        const gaugeVal = document.getElementById('gauge-val');
        const statusBadge = document.getElementById('status-badge');
        const resVal = document.getElementById('res-val');
        const latencyVal = document.getElementById('latency-val');
        const canvas = document.getElementById('capture-canvas');
        
        let autoScanInterval = null;
        let isScanning = false;
        
        // Load Webcams
        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                cameraSelect.innerHTML = '';
                
                if (videoDevices.length === 0) {
                    cameraSelect.innerHTML = '<option value="">No camera found</option>';
                    return;
                }
                
                videoDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${cameraSelect.length + 1}`;
                    cameraSelect.appendChild(option);
                });
                
                // Select first camera and start
                startCamera(videoDevices[0].deviceId);
            } catch (err) {
                console.error("Error listing cameras:", err);
                cameraSelect.innerHTML = '<option value="">Camera access denied</option>';
            }
        }
        
        // Start Webcam Stream
        async function startCamera(deviceId) {
            if (window.stream) {
                window.stream.getTracks().forEach(track => track.stop());
            }
            
            const constraints = {
                video: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                window.stream = stream;
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    resVal.textContent = `${video.videoWidth} x ${video.videoHeight}`;
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
            } catch (err) {
                console.error("Error starting camera:", err);
                statusBadge.textContent = "Camera Stream Error";
            }
        }
        
        // Capture frame and send to backend
        async function captureAndScan() {
            if (isScanning) return;
            isScanning = true;
            
            // Show scanning effects
            laser.style.display = 'block';
            
            try {
                const ctx = canvas.getContext('2d');
                // Draw current frame to hidden canvas
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Get JPEG base64 URL
                const base64Image = canvas.toDataURL('image/jpeg', 0.9);
                
                const t0 = performance.now();
                
                // Call local Flask backend
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ image: base64Image })
                });
                
                const data = await response.json();
                const latency = performance.now() - t0;
                latencyVal.textContent = `${Math.round(latency)} ms`;
                
                if (data.success) {
                    updateUI(data.score, data.label);
                } else {
                    console.error("Prediction error:", data.error);
                }
            } catch (err) {
                console.error("Server API request failed:", err);
                statusBadge.textContent = "API Connection Failed";
                statusBadge.className = "status-badge";
            } finally {
                isScanning = false;
                laser.style.display = 'none';
            }
        }
        
        // Update circular gauge and status badges
        function updateUI(score, label) {
            const percentage = Math.round(score * 100);
            gaugeVal.textContent = `${percentage}%`;
            
            // Circumference of ring = 2 * PI * r = 2 * 3.14159 * 90 = 565.48
            const maxOffset = 565.48;
            const offset = maxOffset - (score * maxOffset);
            gaugeRing.style.strokeDashoffset = offset;
            
            // Set colors dynamically based on score
            if (score >= 0.75) {
                // Screen recapture - Dangerous
                gaugeRing.style.stroke = 'var(--danger-glow)';
                statusBadge.textContent = "Screen Recapture";
                statusBadge.className = "status-badge screen";
            } else if (score >= 0.40) {
                // Suspect / boundary
                gaugeRing.style.stroke = '#ffaa00';
                statusBadge.textContent = "Suspicious Feed";
                statusBadge.className = "status-badge";
                statusBadge.style.color = '#ffaa00';
                statusBadge.style.borderColor = 'rgba(255, 170, 0, 0.2)';
            } else {
                // Real photo - Safe
                gaugeRing.style.stroke = 'var(--success-glow)';
                statusBadge.textContent = "Real Photo";
                statusBadge.className = "status-badge real";
                statusBadge.style.color = 'var(--success-glow)';
                statusBadge.style.borderColor = 'rgba(57, 255, 20, 0.2)';
            }
        }
        
        // Listeners
        cameraSelect.addEventListener('change', () => {
            startCamera(cameraSelect.value);
        });
        
        scanBtn.addEventListener('click', captureAndScan);
        
        autoscanToggle.addEventListener('change', () => {
            if (autoscanToggle.checked) {
                // Start scanning every 1s
                autoScanInterval = setInterval(captureAndScan, 1000);
                scanBtn.disabled = true;
                scanBtn.style.opacity = '0.5';
            } else {
                // Stop interval
                clearInterval(autoScanInterval);
                scanBtn.disabled = false;
                scanBtn.style.opacity = '1';
            }
        });
        
        // Start up
        window.addEventListener('DOMContentLoaded', () => {
            getCameras();
        });
    </script>
</body>
</html>
